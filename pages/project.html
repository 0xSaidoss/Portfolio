<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="/Portfolio/css/theme.css?v=1773560641"/>
  <link rel="stylesheet" href="/Portfolio/css/content.css?v=1773560641"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%23050a0e' width='32' height='32'/><text y='24' font-size='22' fill='%2300d4ff'>⬡</text></svg>"/>
  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
<nav class="nav" id="nav">
  <a href="/Portfolio/index.html" class="nav-logo"><span class="br">[</span>0xSaidoss<span class="br">]</span></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="/Portfolio/index.html">Home</a></li>
    <li><a href="/Portfolio/index.html#projects" class="active">Projets</a></li>
    <li><a href="/Portfolio/index.html#blog">Blog</a></li>
    <li><a href="/Portfolio/index.html#contact">Contact</a></li>
  </ul>
  <button class="nav-admin-btn" onclick="window.location='/Portfolio/admin/index.html'">⬡ Admin</button>
  <button class="nav-hamburger" id="ham"><span></span><span></span><span></span></button>
</nav>

<div id="pageContent" style="padding-top:var(--nav)"></div>
<div id="interactSection" style="max-width:820px;margin:0 auto;padding:0 clamp(1rem,4vw,2rem) 4rem"></div>

<footer>
  <div class="footer-logo">[ 0xSaidoss ]</div>
  <p class="footer-copy">Diallo Mouhamadou Saidou © 2025</p>
  <nav class="footer-links"><a href="/Portfolio/index.html">Home</a><a href="/Portfolio/index.html#projects">Projets</a></nav>
</footer>
<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="cursorFollower"></div>
<div class="toast" id="toast"></div>

<script type="module" src="/Portfolio/js/firebase-store.js?v=1773560641"></script>
<script defer src="/Portfolio/js/main.js?v=1773560641"></script>
<script>
  function waitForStore(cb) {
    if (typeof window.Store !== 'undefined' && typeof window.Store.getProject === 'function') cb();
    else setTimeout(() => waitForStore(cb), 50);
  }
  function esc(s=''){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  waitForStore(async () => {
    const id = new URLSearchParams(location.search).get('id');
    const el = document.getElementById('pageContent');
    el.innerHTML = '<div class="fb-loading"><span class="fb-spinner"></span> Chargement...</div>';
    const p = id ? await Store.getProject(id) : null;

    if (!p) {
      el.innerHTML = `<div class="section"><p style="color:var(--red);font-family:var(--mono)">// Projet introuvable.</p><a href="/Portfolio/index.html" class="btn btn-ghost" style="margin-top:1rem">← Retour</a></div>`;
    } else {
      document.title = `${p.title} | 0xSaidoss`;
      const statusClass = { complete:'badge-green', wip:'badge-amber', ctf:'badge-red' }[p.status] || 'badge-cyan';
      const statusLabel = { complete:'Terminé', wip:'En cours', ctf:'CTF' }[p.status] || p.status;
      el.innerHTML = `
      <div class="content-page">
        <div class="content-hero">
          <div class="ch-inner">
            <a href="/Portfolio/index.html#projects" class="back-link">← Retour aux projets</a>
            <div class="ch-meta">
              <span class="badge ${statusClass}">${statusLabel}</span>
              <span style="font-family:var(--mono);font-size:.7rem;color:var(--txt3)">${new Date(p.createdAt).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}</span>
            </div>
            <h1 class="ch-title">${esc(p.title)}</h1>
            <p class="ch-excerpt">${esc(p.summary||'')}</p>
            <div class="ch-tags">${(p.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
            ${p.githubUrl ? `<div style="margin-top:1.5rem"><a href="${p.githubUrl}" target="_blank" rel="noopener" class="btn btn-cyan">↗ Voir sur GitHub</a></div>` : ''}
          </div>
          <div class="ch-emoji">${p.coverEmoji||'⬡'}</div>
        </div>
        <div class="content-body">
          <div class="content-blocks">${Store.renderBlocks(p.content||[])}</div>
        </div>
      </div>`;
      renderComments(p.id, 'interactSection');
    }
  });
</script>
<script src="/Portfolio/js/pdf-viewer.js?v=1773560641"></script>
</body>
</html>
